<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Drink Menu - BAR disarm</title>
    <style>
        body {
            background-color: #111; /* 黒背景 */
            color: #eee; /* 白文字 */
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            display: inline-block;
        }
        .menu-list {
            list-style: none;
            padding: 0;
            max-width: 600px;
            margin: 0 auto;
        }
        .menu-list li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px dotted #333;
            padding-bottom: 5px;
        }
        .name {
            font-weight: bold;
        }
        .price {
            color: #ccc;
        }
        .back-link {
            margin-top: 40px;
            display: block;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Soft Drink</h1>

    <ul class="menu-list">
        <li><span class="name">ウーロン茶</span><span class="price">500円</span></li>

        <li><span class="name">ポンジュース</span><span class="price">500円</span></li>

        <li><span class="name">ジンジャーエール</span><span class="price">500円</span></li>
        <li><span class="name">ミルク</span><span class="price">500円</span></li>
        <li><span class="name">トマトジュース</span><span class="price">500円</span></li>
        <li><span class="name">アイスコーヒー</span><span class="price">500円</span></li>
        <li><span class="name">アイスカフェオレ</span><span class="price">500円</span></li>
        <li><span class="name">ノンアルコールビール</span><span class="price">600円</span></li>

</html>
